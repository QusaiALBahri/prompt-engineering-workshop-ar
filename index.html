<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>برنامج الورشة</title>
    <style>
      @font-face {
        font-family: "Thmanyah Sans";
        src: url("https://framerusercontent.com/assets/Ej0k3h4Mi5O7TSo2w2JaDCPRgvo.woff2") format("woff2");
        font-display: swap;
        font-weight: 400;
      }
      @font-face {
        font-family: "Thmanyah Sans";
        src: url("https://framerusercontent.com/assets/JUv6rms2ye2kYL3UI3O9YyExQcQ.woff2") format("woff2");
        font-display: swap;
        font-weight: 700;
      }
      body {
        margin: 0;
        font-family: "Thmanyah Sans", sans-serif;
        background: linear-gradient(180deg, #f6fbf7, #edf6ef);
        color: #173126;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        background: rgba(255,255,255,0.86);
        border: 1px solid rgba(255,255,255,0.9);
        border-radius: 28px;
        padding: 32px;
        box-shadow: 0 24px 64px rgba(31, 84, 57, 0.12);
      }
      h1 { margin-top: 0; font-size: clamp(2rem, 5vw, 3.2rem); }
      p { line-height: 1.9; color: #536d60; }
      .links {
        display: grid;
        gap: 14px;
        margin-top: 22px;
      }
      a {
        text-decoration: none;
        color: #1d5f43;
        background: #eef8f0;
        border: 1px solid #dcefe0;
        border-radius: 18px;
        padding: 16px 18px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>مادة الورشة</h1>
      <p>
        هذا المستودع منظم بحسب الأيام. المحتوى المكتمل حالياً موجود داخل
        <strong>اليوم الأول</strong>، أما اليوم الثاني فسيضاف لاحقاً.
      </p>
      <div class="links">
        <a href="day-1/index.html">الدخول إلى صفحة المادة التدريبية</a>
        <a href="day-1/printable-worksheets.html">أوراق العمل القابلة للطباعة</a>
        <a href="day-1/student-progress-checklist.html">ورقة متابعة التقدم</a>
      </div>
    </main>
  </body>
</html>
